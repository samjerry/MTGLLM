# railway.toml
# Railway project configuration for the MTG LLM Assistant
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "NIXPACKS"
buildCommand = "npm install --frozen-lockfile && next build"

[deploy]
startCommand = "node -e \"require('tsx/cjs'); require('./scripts/start.ts');\""
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
